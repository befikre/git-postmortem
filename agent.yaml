spec_version: "0.1.0"
name: git-postmortem
version: 1.0.0
description: "An incident autopilot that reads your git history and writes blameless post-mortems automatically"
author: "git-postmortem"
license: MIT

model:
  preferred: google:gemini-1.5-pro
  fallback:
    - google:gemini-1.5-flash
  constraints:
    temperature: 0.2
    max_tokens: 4096

skills:
  - git-forensics
  - timeline-builder
  - rca-generator
  - action-items

runtime:
  max_turns: 20
  timeout: 180

tags:
  - incident-response
  - post-mortem
  - git-native
  - devops
  - blameless